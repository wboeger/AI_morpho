<svg xmlns="http://www.w3.org/2000/svg" width="600" height="460" viewBox="0 0 600 460">
<rect width="100%" height="100%" fill="white"/>
<defs>
  <style>
    .af  { fill:#dde8f4; stroke:#3a6ea8; stroke-width:1.3; }
    .sm  { stroke:#b03020; stroke-width:1.8; stroke-dasharray:6,3; fill:none; }
    .pm  { stroke:#1a6e2a; stroke-width:1.8; stroke-dasharray:6,3; fill:none; }
    .arc { stroke:#6020a0; stroke-width:2.2; fill:none; }
    .alb { font-family:Arial,sans-serif; font-size:12px; font-weight:bold; fill:#6020a0; }
    .slb { font-family:Arial,sans-serif; font-size:11px; fill:#222; text-anchor:middle; }
    .plb { font-family:Arial,sans-serif; font-size:9px; fill:#1a5490; font-style:italic; }
    .tlb { font-family:Arial,sans-serif; font-size:9px; fill:#666; text-anchor:middle; }
    .bk  { stroke:#cc6600; stroke-width:1.4; fill:none; }
    .leg { font-family:Arial,sans-serif; font-size:9px; fill:#333; }
  </style>
</defs>

<!-- ══════════════ PANEL 1 — STATE 0: slightly curved (~20°) ══════════════ -->
<!-- Orientation: roots at top, junction at y=230, point goes right-and-down -->
<!-- θ=20°: point direction = (sin20°, cos20°) = (0.342, 0.940) in SVG coords -->

<!-- Shaft rectangle -->
<path class="af" d="M 91,108 L 91,230 L 109,230 L 109,108 Z"/>
<!-- Root prongs (two small filled triangles at shaft top) -->
<path class="af" d="M 91,108 L 77,85 L 95,94 Z"/>
<path class="af" d="M 109,108 L 123,85 L 105,94 Z"/>

<!-- Point shape: base=(93,233)/(108,227), tip=(137,332) -->
<!-- perp=(cos20°,-sin20°)=(0.940,-0.342); base pts = junction ± perp*8 -->
<path class="af" d="M 93,233 L 137,332 L 108,227 Z"/>

<!-- Middle shaft bracket (middle third of shaft height, left side) -->
<line class="bk" x1="85" y1="149" x2="85" y2="189"/>
<line class="bk" x1="81" y1="149" x2="89" y2="149"/>
<line class="bk" x1="81" y1="189" x2="89" y2="189"/>

<!-- Shaft midline: vertical red dashed, crosses junction -->
<line class="sm" x1="100" y1="58" x2="100" y2="325"/>

<!-- Point midline: green dashed, through junction at θ=20° (extended +10 each end) -->
<!-- passes through junction(100,230) ✓ -->
<line class="pm" x1="83" y1="183" x2="142" y2="347"/>

<!-- Angle arc at LOWER crossing (between shaft-down and point direction), θ=20° -->
<!-- arc start: junction+(0,+26)=(100,256); arc end: junction+d*26=(109,254) -->
<!-- sweep=0 (CCW on screen): from south CCW to SE = short 20° arc -->
<path class="arc" d="M 100,256 A 26,26 0 0,0 109,254"/>

<!-- Angle label at bisector (10° from downward) -->
<text class="alb" x="109" y="278">~20°</text>

<!-- Part labels -->
<text class="plb" x="143" y="305">Point</text>
<text class="plb" x="73"  y="172">Shaft</text>
<text class="plb" x="75"  y="90">Roots</text>

<!-- State label -->
<text class="slb" x="100" y="400">State 0 — slightly curved</text>
<text class="tlb" x="100" y="415">angle &lt; 30°</text>


<!-- ══════════════ PANEL 2 — STATE 1: moderately curved (~50°) ══════════════ -->
<!-- θ=50°: point direction = (sin50°, cos50°) = (0.766, 0.643) -->

<!-- Shaft rectangle -->
<path class="af" d="M 291,108 L 291,230 L 309,230 L 309,108 Z"/>
<!-- Root prongs -->
<path class="af" d="M 291,108 L 277,85 L 295,94 Z"/>
<path class="af" d="M 309,108 L 323,85 L 305,94 Z"/>

<!-- Point shape: v1=(0.766,0.643); perp=(-0.643,0.766) -->
<!-- base_left=junction+perp*8=(295,236), base_right=junction-perp*8=(305,224), tip=(369,288) -->
<path class="af" d="M 295,236 L 369,288 L 305,224 Z"/>

<!-- Middle shaft bracket (middle third) -->
<line class="bk" x1="285" y1="149" x2="285" y2="189"/>
<line class="bk" x1="281" y1="149" x2="289" y2="149"/>
<line class="bk" x1="281" y1="189" x2="289" y2="189"/>

<!-- Shaft midline -->
<line class="sm" x1="300" y1="58" x2="300" y2="325"/>

<!-- Point midline: through junction(300,230), extended each end -->
<line class="pm" x1="277" y1="211" x2="377" y2="294"/>

<!-- Angle arc: shaft-downward to point direction, θ=50° -->
<!-- arc start: (300,256); arc end: junction+v1*26=(320,247) -->
<path class="arc" d="M 300,256 A 26,26 0 0,0 320,247"/>

<!-- Angle label at bisector -->
<text class="alb" x="320" y="272">~50°</text>

<!-- Part labels -->
<text class="plb" x="374" y="286">Point</text>
<text class="plb" x="273" y="172">Shaft</text>

<!-- State label -->
<text class="slb" x="300" y="400">State 1 — moderately curved</text>
<text class="tlb" x="300" y="415">30° – 60°</text>


<!-- ══════════════ PANEL 3 — STATE 2: strongly curved (~80°) ══════════════ -->
<!-- θ=80°: point direction = (sin80°, cos80°) = (0.985, 0.174) -->
<!-- Acute exterior angle ≈ 80°; point approaches a right angle with the shaft -->

<!-- Shaft rectangle -->
<path class="af" d="M 491,108 L 491,230 L 509,230 L 509,108 Z"/>
<!-- Root prongs -->
<path class="af" d="M 491,108 L 477,85 L 495,94 Z"/>
<path class="af" d="M 509,108 L 523,85 L 505,94 Z"/>

<!-- Point shape: v1=(0.985,0.174); perp=(-0.174,0.985) -->
<!-- base_left=junction+perp*8=(499,238), base_right=junction-perp*8=(501,222), tip at 85px=(584,245) -->
<path class="af" d="M 499,238 L 584,245 L 501,222 Z"/>

<!-- Middle shaft bracket (middle third) -->
<line class="bk" x1="485" y1="149" x2="485" y2="189"/>
<line class="bk" x1="481" y1="149" x2="489" y2="149"/>
<line class="bk" x1="481" y1="189" x2="489" y2="189"/>

<!-- Shaft midline -->
<line class="sm" x1="500" y1="58" x2="500" y2="325"/>

<!-- Point midline: through junction(500,230), extended each end -->
<!-- start: junction-v1*30=(471,225); end: junction+v1*95=(594,247) -->
<line class="pm" x1="471" y1="225" x2="594" y2="247"/>

<!-- Angle arc: shaft-downward to point direction, θ=80° (acute) -->
<!-- arc start: (500,256); arc end: junction+v1*26=(526,235) -->
<!-- cross_z=(0,1)×(0.985,0.174)=-0.985<0 → sweep=0 ✓ -->
<path class="arc" d="M 500,256 A 26,26 0 0,0 526,235"/>

<!-- Angle label at bisector of -v2=[0,1] and v1=[0.985,0.174] -->
<text class="alb" x="527" y="264">~80°</text>

<!-- Part labels -->
<text class="plb" x="581" y="240">Point</text>
<text class="plb" x="473" y="172">Shaft</text>

<!-- State label -->
<text class="slb" x="500" y="400">State 2 — strongly curved</text>
<text class="tlb" x="500" y="415">angle &gt; 60°</text>


<!-- ══════════════════════════ LEGEND ══════════════════════════════════════ -->
<line x1="15"  y1="440" x2="37"  y2="440" stroke="#1a6e2a" stroke-width="1.5" stroke-dasharray="5,2"/>
<text class="leg" x="41"  y="444">point midline</text>
<line x1="128" y1="440" x2="150" y2="440" stroke="#b03020" stroke-width="1.5" stroke-dasharray="5,2"/>
<text class="leg" x="154" y="444">shaft midline (middle third)</text>
<path d="M 340,444 A 7,7 0 0,1 347,444" stroke="#6020a0" stroke-width="1.8" fill="none"/>
<text class="leg" x="350" y="444">deviation angle</text>
<line x1="432" y1="440" x2="447" y2="440" stroke="#cc6600" stroke-width="1.8"/>
<text class="leg" x="450" y="444">middle third of shaft</text>
</svg>
