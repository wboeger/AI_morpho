{% extends "base.html" %}
{% block title %}Register — GyroMorpho{% endblock %}
{% block back_button %}{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="card">
        <h2>Create account</h2>
        <p style="font-size:0.85rem; color:var(--gray-500,#888); margin-top:-0.5rem;">
            Admin only — create a login for a colleague.
        </p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Email <span style="font-weight:400; color:var(--gray-500);">(optional)</span></label>
                <input type="email" name="email">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="annotator">Annotator</option>
                    <option value="reviewer">Reviewer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password <span style="font-weight:400; color:var(--gray-500);">(min 6 characters)</span></label>
                <input type="password" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.25rem;">Create account</button>
        </form>
        <p style="margin-top:1rem; font-size:0.875rem; text-align:center;">
            <a href="{{ url_for('project.dashboard') }}">← Back to dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
