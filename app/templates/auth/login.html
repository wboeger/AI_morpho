{% extends "base.html" %}
{% block title %}Login — GyroMorpho{% endblock %}
{% block back_button %}{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="card">
        <h2>Sign in</h2>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.25rem;">Sign in</button>
        </form>
        <p style="margin-top:1rem; font-size:0.8rem; text-align:center; color:var(--gray-500,#888);">
            Access by invitation only. Contact the administrator for an account.
        </p>
    </div>
</div>
{% endblock %}
