{% extends "base.html" %}
{% block title %}New Taxonomic Group - {{ project.name }}{% endblock %}
{% block content %}
<h1>Define Taxonomic Group</h1>
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group">
            <label>Group Name</label>
            <input type="text" name="name" required placeholder="e.g., Gyrodactylus">
        </div>
        <div class="form-group">
            <label>Rank</label>
            <select name="rank">
                <option value="genus">Genus</option>
                <option value="subgenus">Subgenus</option>
                <option value="subfamily">Subfamily</option>
                <option value="family">Family</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Included Species</label>
            <div class="checkbox-list">
                {% for sp in all_species %}
                <label><input type="checkbox" name="species" value="{{ sp }}"> <em>{{ sp }}</em></label>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Create & Generate Diagnosis</button>
        <a href="{{ url_for('descriptions.diagnoses', project_id=project.id) }}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
