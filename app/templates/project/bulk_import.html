{% extends "base.html" %}
{% block title %}Bulk Import - {{ project.name }}{% endblock %}
{% block content %}
<h1>Bulk Import Specimens</h1>
<div class="card" style="max-width:600px;">
    <p style="margin-bottom:1rem; color:var(--gray-500); font-size:0.9rem;">
        Upload a CSV file with columns: <code>species_name</code>, <code>specimen_id</code>,
        <code>structure_type</code>, <code>dna_markers</code> (comma-separated), <code>notes</code>.
    </p>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>CSV File</label>
            <input type="file" name="csv_file" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-primary">Import</button>
        <a href="{{ url_for('project.view_project', project_id=project.id) }}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
