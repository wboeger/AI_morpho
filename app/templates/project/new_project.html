{% extends "base.html" %}
{% block title %}New Project - GyroMorpho{% endblock %}
{% block content %}
<h1>New Project</h1>
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group">
            <label>Project Name</label>
            <input type="text" name="name" required placeholder="e.g., Gyrodactylidae ITS phylogeny">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Brief description of the project goals"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Project</button>
        <a href="{{ url_for('project.dashboard') }}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
