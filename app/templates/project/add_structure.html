{% extends "base.html" %}
{% block title %}Add Structure - {{ specimen.species_name }}{% endblock %}
{% block content %}
<h1>Add Structure for <em>{{ specimen.species_name }}</em></h1>
<div class="card" style="max-width:600px;">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Structure Type</label>
            <select name="structure_type" required>
                <option value="">-- Select --</option>
                <option value="hook">Marginal Hook</option>
                <option value="anchor">Anchor (Hamulus)</option>
                <option value="superficial_bar">Superficial Bar</option>
                <option value="deep_bar">Deep Bar</option>
                <option value="mco">Male Copulatory Organ (MCO)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Structure Image</label>
            <input type="file" name="image" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">Add Structure</button>
        <a href="{{ url_for('project.view_project', project_id=project.id) }}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
